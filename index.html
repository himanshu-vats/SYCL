const { useState, useMemo, useCallback } = React;


const POINTS = { win: 2, abandoned: 1, forfeit_winner: 2, forfeit_loser: 0, loss: 0 };

function parseSchedule(raw) {
  let headerIdx = -1;
  for (let i = 0; i < Math.min(raw.length, 10); i++) {
    const row = raw[i].map(c => String(c || "").toLowerCase());
    if (row.some(c => c.includes("division")) && row.some(c => c.includes("team"))) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return null;
  const headers = raw[headerIdx].map(h => String(h || "").trim());
  const colMap = {};
  const knownCols = {
    "#": ["#","no","number"], series: ["series"], division: ["division"],
    matchType: ["match type","matchtype","type"], date: ["date"], time: ["time"],
    team1: ["team one","team 1","team1","teamone"], team2: ["team two","team 2","team2","teamtwo"],
    ground: ["ground","venue"], umpire1: ["umpire one","umpire 1","umpire1"],
    umpire2: ["umpire two","umpire 2","umpire2"], result: ["result","match result"],
    winner: ["winner"], status: ["status"],
  };
  headers.forEach((h, i) => {
    const hl = h.toLowerCase().replace(/[*()\/\\0-9.]/g, "").trim();
    for (const [key, aliases] of Object.entries(knownCols)) {
      if (aliases.some(a => hl === a || hl.includes(a))) { if (!colMap[key]) colMap[key] = i; }
    }
  });
  const matches = [];
  for (let i = headerIdx + 1; i < raw.length; i++) {
    const row = raw[i];
    if (!row || !row[colMap.division] || !row[colMap.team1] || !row[colMap.team2]) continue;
    const div = String(row[colMap.division]).trim();
    const t1 = String(row[colMap.team1]).trim();
    const t2 = String(row[colMap.team2]).trim();
    if (!div || !t1 || !t2) continue;
    let dateStr = "";
    const rawDate = row[colMap.date];
    if (rawDate instanceof Date) {
      dateStr = `${String(rawDate.getMonth()+1).padStart(2,"0")}/${String(rawDate.getDate()).padStart(2,"0")}/${rawDate.getFullYear()}`;
    } else if (typeof rawDate === "number") {
      const d = new Date((rawDate - 25569) * 86400000);
      dateStr = `${String(d.getUTCMonth()+1).padStart(2,"0")}/${String(d.getUTCDate()).padStart(2,"0")}/${d.getUTCFullYear()}`;
    } else { dateStr = String(rawDate || "").trim(); }
    matches.push({
      id: row[colMap["#"]] || i, division: div,
      matchType: colMap.matchType !== undefined ? String(row[colMap.matchType]||"").trim() : "",
      date: dateStr, time: String(row[colMap.time]||"").trim(), team1: t1, team2: t2,
      ground: colMap.ground !== undefined ? String(row[colMap.ground]||"").trim() : "",
      umpire1: colMap.umpire1 !== undefined ? String(row[colMap.umpire1]||"").trim() : "",
      umpire2: colMap.umpire2 !== undefined ? String(row[colMap.umpire2]||"").trim() : "",
      result: colMap.result !== undefined ? String(row[colMap.result]||"").trim() : "",
      winner: colMap.winner !== undefined ? String(row[colMap.winner]||"").trim() : "",
      status: colMap.status !== undefined ? String(row[colMap.status]||"").trim() : "",
    });
  }
  return { matches, divisions: [...new Set(matches.map(m => m.division))], colMap };
}

function parseDate(s) {
  if (!s) return null;
  const p = s.split("/");
  if (p.length === 3) return new Date(parseInt(p[2]), parseInt(p[0])-1, parseInt(p[1]));
  return new Date(s);
}

function isAM(time) {
  if (!time) return null;
  const t = time.toUpperCase();
  if (t.includes("AM")) return true;
  if (t.includes("PM")) return false;
  return null;
}

function computeBalance(matches, teams) {
  const s = {};
  teams.forEach(t => { s[t] = { home:0, away:0, am:0, pm:0, umpire:0, games:0 }; });
  matches.forEach(m => {
    if (s[m.team1]) { s[m.team1].home++; s[m.team1].games++; }
    if (s[m.team2]) { s[m.team2].away++; s[m.team2].games++; }
    const a = isAM(m.time);
    if (a===true) { if(s[m.team1]) s[m.team1].am++; if(s[m.team2]) s[m.team2].am++; }
    else if (a===false) { if(s[m.team1]) s[m.team1].pm++; if(s[m.team2]) s[m.team2].pm++; }
    if (m.umpire1 && s[m.umpire1]) s[m.umpire1].umpire++;
    if (m.umpire2 && s[m.umpire2]) s[m.umpire2].umpire++;
  });
  return s;
}

function computeStandings(matches, teams) {
  const s = {};
  teams.forEach(t => { s[t] = { played:0, won:0, lost:0, abandoned:0, forfeited:0, points:0 }; });
  matches.forEach(m => {
    const res = (m.result||"").toLowerCase(), winner = (m.winner||"").trim(), status = (m.status||"").toLowerCase();
    if (!res && !winner && !status) return;
    if (res.includes("abandon") || status.includes("abandon") || res.includes("no result")) {
      if(s[m.team1]){s[m.team1].played++;s[m.team1].abandoned++;s[m.team1].points+=POINTS.abandoned;}
      if(s[m.team2]){s[m.team2].played++;s[m.team2].abandoned++;s[m.team2].points+=POINTS.abandoned;}
      return;
    }
    if (res.includes("forfeit")) {
      if (winner) {
        if(s[winner]){s[winner].played++;s[winner].won++;s[winner].points+=POINTS.forfeit_winner;}
        const loser=winner===m.team1?m.team2:m.team1;
        if(s[loser]){s[loser].played++;s[loser].forfeited++;}
      }
      return;
    }
    let w = winner;
    if (!w && res) {
      if (res.includes(m.team1.toLowerCase())) w=m.team1;
      else if (res.includes(m.team2.toLowerCase())) w=m.team2;
    }
    if (w) {
      const loser=w===m.team1?m.team2:m.team1;
      if(s[w]){s[w].played++;s[w].won++;s[w].points+=POINTS.win;}
      if(s[loser]){s[loser].played++;s[loser].lost++;}
    }
  });
  return Object.entries(s).map(([team,d])=>({team,...d})).sort((a,b)=>b.points-a.points||b.won-a.won||a.lost-b.lost);
}

function scanIssues(matches) {
  const issues = [];
  const add = (level,div,title,detail,ids) => issues.push({level,div,title,detail,matchIds:ids||[]});
  const byDiv = {};
  matches.forEach(m => { if(!byDiv[m.division]) byDiv[m.division]=[]; byDiv[m.division].push(m); });

  Object.entries(byDiv).forEach(([div,dms]) => {
    const teams=[...new Set(dms.flatMap(m=>[m.team1,m.team2]))];
    const teamSet=new Set(teams);

    const pairCount={};
    dms.forEach(m=>{const k=[m.team1,m.team2].sort().join("|||");if(!pairCount[k])pairCount[k]=[];pairCount[k].push(m);});
    Object.entries(pairCount).forEach(([pair,ms])=>{
      if(ms.length>1){const n=pair.split("|||");add("error",div,"Duplicate matchup",`${n[0]} vs ${n[1]} scheduled ${ms.length}x (#${ms.map(m=>m.id).join(", #")})`,ms.map(m=>m.id));}
    });

    const tdg={};
    dms.forEach(m=>{[m.team1,m.team2].forEach(t=>{const k=`${t}|||${m.date}`;if(!tdg[k])tdg[k]=[];tdg[k].push(m);});});
    Object.entries(tdg).forEach(([k,ms])=>{
      if(ms.length>1){const[team,date]=k.split("|||");add("error",div,"Double-booked team",`${team} plays ${ms.length} games on ${date} (#${ms.map(m=>m.id).join(", #")})`,ms.map(m=>m.id));}
    });

    dms.forEach(m=>{
      [m.umpire1,m.umpire2].forEach(u=>{
        if(u&&(u===m.team1||u===m.team2)) add("error",div,"Self-umpiring",`${u} umpires own match #${m.id} (${m.team1} vs ${m.team2}, ${m.date})`,[m.id]);
      });
    });

    dms.forEach(m=>{
      if(m.umpire1&&!teamSet.has(m.umpire1)) add("warn",div,"Cross-division umpire",`${m.umpire1} (not in ${div}) umpires match #${m.id}`,[m.id]);
    });

    const stats=computeBalance(dms,teams);
    Object.entries(stats).forEach(([team,s])=>{
      if(Math.abs(s.home-s.away)>=3) add("warn",div,"Home/Away imbalance",`${team}: ${s.home}H / ${s.away}A`);
      if(Math.abs(s.am-s.pm)>=3) add("warn",div,"AM/PM imbalance",`${team}: ${s.am}AM / ${s.pm}PM`);
    });

    const gc=Object.values(stats).map(s=>s.games);
    if(Math.max(...gc)-Math.min(...gc)>=2){
      const lo=Object.entries(stats).filter(([,s])=>s.games<=Math.min(...gc)).map(([t,s])=>`${t} (${s.games})`);
      const hi=Object.entries(stats).filter(([,s])=>s.games>=Math.max(...gc)).map(([t,s])=>`${t} (${s.games})`);
      add("warn",div,"Uneven game counts",`Range ${Math.min(...gc)}-${Math.max(...gc)}. Fewest: ${lo.join(", ")}. Most: ${hi.join(", ")}`);
    }

    const noT=dms.filter(m=>!m.time); if(noT.length) add("info",div,"Missing time",`${noT.length} match(es)`);
    const noG=dms.filter(m=>!m.ground); if(noG.length) add("info",div,"Missing ground",`${noG.length} match(es)`);
    const noU=dms.filter(m=>!m.umpire1); if(noU.length) add("info",div,"Missing umpire",`${noU.length} match(es)`);
  });

  const slotMap={};
  matches.forEach(m=>{
    if(!m.ground||!m.date||!m.time) return;
    const k=`${m.ground}|||${m.date}|||${m.time}`;if(!slotMap[k])slotMap[k]=[];slotMap[k].push(m);
  });
  Object.entries(slotMap).forEach(([k,ms])=>{
    if(ms.length>1){const[ground,date,time]=k.split("|||");add("error","ALL","Ground conflict",`${ground} on ${date} ${time}: ${ms.map(m=>`#${m.id} ${m.division}`).join(" + ")}`,ms.map(m=>m.id));}
  });

  const order={error:0,warn:1,info:2};
  issues.sort((a,b)=>order[a.level]-order[b.level]);
  return issues;
}

function BB({ val, ideal }) {
  const d = Math.abs(val - ideal);
  return <span className={`badge ${d===0?"badge-ok":d===1?"badge-warn":"badge-bad"}`}>{val}</span>;
}

function BalanceView({ matches, division }) {
  const dm = matches.filter(m => m.division === division);
  const teams = [...new Set(dm.flatMap(m => [m.team1, m.team2]))].sort();
  const stats = computeBalance(dm, teams);
  const n = dm.length;
  const iHA = teams.length > 1 ? Math.round(n * 2 / teams.length / 2) : 0;
  const iU = teams.length > 0 ? Math.round(n / teams.length) : 0;

  return (
    <div>
      <div className="summary-row">
        <div className="summary-card"><div className="label">Teams</div><div className="value">{teams.length}</div></div>
        <div className="summary-card"><div className="label">Matches</div><div className="value">{n}</div></div>
        <div className="summary-card"><div className="label">Ideal H/A</div><div className="value">{iHA}/{iHA}</div></div>
        <div className="summary-card"><div className="label">Ideal AM/PM</div><div className="value">{iHA}/{iHA}</div></div>
        <div className="summary-card"><div className="label">Ideal Ump</div><div className="value">{iU}</div></div>
      </div>
      <div className="scroll-x">
        <table><thead><tr>
          <th>Team</th><th style={{textAlign:"center"}}>GP</th>
          <th style={{textAlign:"center"}}>Home</th><th style={{textAlign:"center"}}>Away</th>
          <th style={{textAlign:"center"}}>AM</th><th style={{textAlign:"center"}}>PM</th>
          <th style={{textAlign:"center"}}>Ump</th><th style={{textAlign:"center"}}>H/A</th><th style={{textAlign:"center"}}>Slot</th>
        </tr></thead><tbody>
          {teams.map(t => {
            const s = stats[t]; const hd = Math.abs(s.home-s.away); const sd = Math.abs(s.am-s.pm);
            return (<tr key={t}>
              <td className="team-name">{t}</td><td className="num-cell">{s.games}</td>
              <td className="num-cell"><BB val={s.home} ideal={iHA}/></td>
              <td className="num-cell"><BB val={s.away} ideal={iHA}/></td>
              <td className="num-cell"><BB val={s.am} ideal={iHA}/></td>
              <td className="num-cell"><BB val={s.pm} ideal={iHA}/></td>
              <td className="num-cell"><BB val={s.umpire} ideal={iU}/></td>
              <td className="num-cell"><span className={`badge ${hd===0?"badge-ok":hd===1?"badge-warn":"badge-bad"}`}>{hd===0?"even":`${s.home>s.away?"H":"A"}+${hd}`}</span></td>
              <td className="num-cell"><span className={`badge ${sd===0?"badge-ok":sd===1?"badge-warn":"badge-bad"}`}>{sd===0?"even":`${s.am>s.pm?"AM":"PM"}+${sd}`}</span></td>
            </tr>);
          })}
        </tbody></table>
      </div>
    </div>
  );
}

function ScheduleView({ matches, division }) {
  const dm = matches.filter(m => m.division === division).sort((a, b) => {
    const da = parseDate(a.date), db = parseDate(b.date);
    if (da && db && da.getTime() !== db.getTime()) return da - db;
    return (a.time || "").localeCompare(b.time || "");
  });
  const grouped = {};
  dm.forEach(m => { const k = m.date || "Unknown"; if (!grouped[k]) grouped[k] = []; grouped[k].push(m); });
  const today = new Date(); today.setHours(0,0,0,0);

  return (
    <div className="scroll-x">
      <table><thead><tr><th>#</th><th>Time</th><th>Home (Team 1)</th><th>Away (Team 2)</th><th>Ground</th><th>Umpire</th><th>Result</th></tr></thead>
        <tbody>
          {Object.entries(grouped).map(([date, ms]) => {
            const d = parseDate(date); const past = d && d < today;
            return [
              <tr key={`h-${date}`}><td colSpan={7} className="date-group">
                {date}{d && ` — ${d.toLocaleDateString("en-US",{weekday:"long"})}`}
                {past && <span style={{marginLeft:8,color:"var(--text-muted)",fontSize:11}}>PLAYED</span>}
              </td></tr>,
              ...ms.map(m => (
                <tr key={m.id}>
                  <td className="num-cell" style={{color:"var(--text-muted)"}}>{m.id}</td>
                  <td><span className={`badge ${isAM(m.time)?"badge-am":"badge-pm"}`}>{m.time}</span></td>
                  <td className="team-name">{m.team1}</td><td className="team-name">{m.team2}</td>
                  <td style={{color:"var(--text-secondary)",fontSize:12}}>{m.ground||"—"}</td>
                  <td style={{color:"var(--text-secondary)",fontSize:12}}>{m.umpire1||"—"}</td>
                  <td style={{fontSize:12,color:m.result?"var(--accent-text)":"var(--text-muted)"}}>{m.result||m.winner||"—"}</td>
                </tr>
              ))
            ];
          })}
        </tbody>
      </table>
    </div>
  );
}

function StandingsView({ matches, division }) {
  const dm = matches.filter(m => m.division === division);
  const teams = [...new Set(dm.flatMap(m => [m.team1, m.team2]))].sort();
  const standings = computeStandings(dm, teams);
  if (!standings.some(s => s.played > 0)) return <div className="empty-state">No result data in this export yet.</div>;
  return (
    <div className="scroll-x">
      <table><thead><tr><th style={{width:30}}>#</th><th>Team</th><th style={{textAlign:"center"}}>P</th><th style={{textAlign:"center"}}>W</th><th style={{textAlign:"center"}}>L</th><th style={{textAlign:"center"}}>Abd</th><th style={{textAlign:"center"}}>Fft</th><th style={{textAlign:"center"}}>Pts</th></tr></thead>
        <tbody>
          {standings.map((s, i) => (
            <tr key={s.team}><td className="num-cell" style={{color:"var(--text-muted)"}}>{i+1}</td>
              <td className="team-name">{s.team}</td><td className="num-cell">{s.played}</td><td className="num-cell">{s.won}</td>
              <td className="num-cell">{s.lost}</td><td className="num-cell">{s.abandoned}</td>
              <td className="num-cell">{s.forfeited}</td><td className="num-cell points-cell">{s.points}</td></tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function PairingsView({ matches, division }) {
  const dm = matches.filter(m => m.division === division);
  const teams = [...new Set(dm.flatMap(m => [m.team1, m.team2]))].sort();
  const played = new Set();
  dm.forEach(m => { played.add([m.team1, m.team2].sort().join("|||")); });
  const total = (teams.length * (teams.length - 1)) / 2;

  return (
    <div>
      <div className="summary-row">
        <div className="summary-card"><div className="label">Unique Pairings</div><div className="value">{played.size}/{total}</div></div>
        <div className="summary-card"><div className="label">Remaining</div><div className="value">{total - played.size}</div></div>
      </div>
      <div className="scroll-x">
        <table><thead><tr><th></th>
          {teams.map(t => <th key={t} style={{textAlign:"center",fontSize:10,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis"}} title={t}>
            {t.replace(/^(MLCA |MSKICA |Super11|Boltz |ICCS |PBL |OCA |Seattle Chargers )/,"").substring(0,8)}
          </th>)}
        </tr></thead><tbody>
          {teams.map(t1 => (
            <tr key={t1}>
              <td className="team-name" style={{fontSize:12}}>{t1}</td>
              {teams.map(t2 => {
                if (t1===t2) return <td key={t2} style={{background:"var(--bg-secondary)"}}></td>;
                const ip = played.has([t1,t2].sort().join("|||"));
                return <td key={t2} className="num-cell" style={{background:ip?"var(--pair-yes-bg)":"var(--pair-no-bg)",color:ip?"var(--clr-ok)":"var(--clr-bad)",fontSize:14}}>{ip?"✓":"✗"}</td>;
              })}
            </tr>
          ))}
        </tbody></table>
      </div>
    </div>
  );
}

function IssuesView({ matches, filterDiv, onFilterDiv }) {
  const issues = useMemo(() => scanIssues(matches), [matches]);
  const [levelFilter, setLevelFilter] = useState("all");
  const allDivs = useMemo(() => ["ALL", ...new Set(issues.map(i => i.div))], [issues]);
  const filtered = issues.filter(i => {
    if (filterDiv && filterDiv !== "ALL" && i.div !== filterDiv && i.div !== "ALL") return false;
    if (levelFilter !== "all" && i.level !== levelFilter) return false;
    return true;
  });
  const ec = issues.filter(i => i.level === "error").length;
  const wc = issues.filter(i => i.level === "warn").length;
  const ic = issues.filter(i => i.level === "info").length;

  return (
    <div>
      <div className="issues-summary">
        <div className="issues-count"><div className="issues-dot" style={{background:"var(--clr-bad)"}}></div>{ec} errors</div>
        <div className="issues-count"><div className="issues-dot" style={{background:"var(--clr-warn)"}}></div>{wc} warnings</div>
        <div className="issues-count"><div className="issues-dot" style={{background:"var(--clr-info)"}}></div>{ic} info</div>
      </div>
      <div className="filter-bar">
        {["all","error","warn","info"].map(l => (
          <button key={l} className={`filter-btn ${levelFilter===l?"active":""}`} onClick={()=>setLevelFilter(l)}>
            {l==="all"?"All":l==="error"?"Errors":l==="warn"?"Warnings":"Info"}
          </button>
        ))}
        <span style={{width:1,background:"var(--border)",margin:"0 4px",alignSelf:"stretch"}}></span>
        {allDivs.map(d => (
          <button key={d} className={`filter-btn ${(!filterDiv&&d==="ALL")||(filterDiv===d)?"active":""}`}
            onClick={()=>onFilterDiv(d==="ALL"?null:d)}>{d}</button>
        ))}
      </div>
      {filtered.length === 0 ? (
        <div className="empty-state" style={{color:"var(--clr-ok)"}}>{issues.length===0?"No issues found. Schedule looks clean.":"No issues match current filter."}</div>
      ) : (
        filtered.map((issue, i) => (
          <div key={i} className={`issue-card ${issue.level}`}>
            <div className="issue-header">
              <span className={`issue-sev ${issue.level}`}>{issue.level==="error"?"ERROR":issue.level==="warn"?"WARN":"INFO"}</span>
              <span className="issue-div">{issue.div}</span>
              <span className="issue-title">{issue.title}</span>
            </div>
            <div className="issue-detail">{issue.detail}</div>
          </div>
        ))
      )}
    </div>
  );
}

function SYCLDashboard() {
  const [data, setData] = useState(null);
  const [selectedDivision, setSelectedDivision] = useState(null);
  const [activeTab, setActiveTab] = useState("balance");
  const [fileName, setFileName] = useState("");
  const [issuesDivFilter, setIssuesDivFilter] = useState(null);
  const [showIssues, setShowIssues] = useState(false);
  const [theme, setTheme] = useState("light");

  const handleUpload = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = (evt) => {
      const wb = XLSX.read(new Uint8Array(evt.target.result), { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      const parsed = parseSchedule(raw);
      if (parsed && parsed.divisions.length > 0) {
        setData(parsed); setSelectedDivision(parsed.divisions[0]); setActiveTab("balance"); setShowIssues(false);
      }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  const divOrder = ["Emerging Stars","U11A","U11B","U13A","U13B","U15A","U15B"];
  const sortedDivs = useMemo(() => {
    if (!data) return [];
    return [...data.divisions].sort((a, b) => {
      const ai = divOrder.indexOf(a), bi = divOrder.indexOf(b);
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });
  }, [data]);

  const ic = useMemo(() => {
    if (!data) return { errors: 0, warnings: 0 };
    const issues = scanIssues(data.matches);
    return { errors: issues.filter(i=>i.level==="error").length, warnings: issues.filter(i=>i.level==="warn").length };
  }, [data]);

  const ibCls = ic.errors > 0 ? "has-errors" : ic.warnings > 0 ? "has-warnings" : "all-clear";

  return (
    <>
      <style>{STYLES}</style>
      <div className="app" data-theme={theme}>
        <div className="header">
          <div>
            <h1>SYCL Schedule Dashboard</h1>
            {fileName && <div className="header-sub">{fileName}</div>}
          </div>
          <div className="header-actions">
            {data && (
              <label className="small-btn">
                Reload<input type="file" accept=".xlsx,.xls,.csv" onChange={handleUpload} style={{display:"none"}} />
              </label>
            )}
            <button className="theme-toggle" onClick={() => setTheme(t => t === "light" ? "dark" : "light")} title="Toggle theme">
              {theme === "light" ? "☾" : "☀"}
            </button>
          </div>
        </div>

        {!data ? (
          <label className="upload-zone">
            <input type="file" accept=".xlsx,.xls,.csv" onChange={handleUpload} />
            <div style={{fontSize:32,marginBottom:8}}>📊</div>
            <div style={{fontSize:16,fontWeight:600,color:"var(--text-primary)",marginBottom:4}}>Upload CricClubs Schedule Export</div>
            <p>.xlsx exported from CricClubs</p>
          </label>
        ) : (
          <>
            <div className="division-bar">
              <button className={`div-btn issues-btn ${ibCls} ${showIssues?"active":""}`}
                onClick={()=>{setShowIssues(true);setSelectedDivision(null);}}>
                {ic.errors > 0 ? `⚠ Issues (${ic.errors})` : ic.warnings > 0 ? `Issues (${ic.warnings})` : "✓ No Issues"}
              </button>
              <span style={{width:1,background:"var(--border)",margin:"0 4px"}}></span>
              {sortedDivs.map(d => (
                <button key={d} className={`div-btn ${!showIssues&&selectedDivision===d?"active":""}`}
                  onClick={()=>{setSelectedDivision(d);setShowIssues(false);setActiveTab("balance");}}>
                  {d}
                </button>
              ))}
            </div>

            {showIssues ? (
              <IssuesView matches={data.matches} filterDiv={issuesDivFilter} onFilterDiv={setIssuesDivFilter} />
            ) : (
              <>
                <div className="tab-bar">
                  {[["balance","Balance"],["schedule","Schedule"],["pairings","Pairings Matrix"],["standings","Standings"]].map(([k,l])=>(
                    <button key={k} className={`tab-btn ${activeTab===k?"active":""}`} onClick={()=>setActiveTab(k)}>{l}</button>
                  ))}
                </div>
                {selectedDivision && activeTab==="balance" && <BalanceView matches={data.matches} division={selectedDivision}/>}
                {selectedDivision && activeTab==="schedule" && <ScheduleView matches={data.matches} division={selectedDivision}/>}
                {selectedDivision && activeTab==="pairings" && <PairingsView matches={data.matches} division={selectedDivision}/>}
                {selectedDivision && activeTab==="standings" && <StandingsView matches={data.matches} division={selectedDivision}/>}
              </>
            )}
          </>
        )}
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SYCLDashboard));
  </script>
</body>
</html>
