  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

const POINTS = { win: 2, abandoned: 1, forfeit_winner: 2, forfeit_loser: 0, loss: 0 };

function parseSchedule(raw) {
  let headerIdx = -1;
  for (let i = 0; i < Math.min(raw.length, 10); i++) {
    const row = raw[i].map(c => String(c || "").toLowerCase());
    if (row.some(c => c.includes("division")) && row.some(c => c.includes("team"))) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return null;
  const headers = raw[headerIdx].map(h => String(h || "").trim());
  const colMap = {};
  const knownCols = {
    "#": ["#","no","number"], series: ["series"], division: ["division"],
    matchType: ["match type","matchtype","type"], date: ["date"], time: ["time"],
    team1: ["team one","team 1","team1","teamone"], team2: ["team two","team 2","team2","teamtwo"],
    ground: ["ground","venue"], umpire1: ["umpire one","umpire 1","umpire1"],
    umpire2: ["umpire two","umpire 2","umpire2"], result: ["result","match result"],
    winner: ["winner"], status: ["status"],
  };
  headers.forEach((h, i) => {
    const hl = h.toLowerCase().replace(/[*()\/\\0-9.]/g, "").trim();
    for (const [key, aliases] of Object.entries(knownCols)) {
      if (aliases.some(a => hl === a || hl.includes(a))) { if (!colMap[key]) colMap[key] = i; }
    }
  });
  const matches = [];
  for (let i = headerIdx + 1; i < raw.length; i++) {
    const row = raw[i];
    if (!row || !row[colMap.division] || !row[colMap.team1] || !row[colMap.team2]) continue;
    const div = String(row[colMap.division]).trim();
    const t1 = String(row[colMap.team1]).trim();
    const t2 = String(row[colMap.team2]).trim();
    if (!div || !t1 || !t2) continue;
    let dateStr = "";
    const rawDate = row[colMap.date];
    if (rawDate instanceof Date) {
      dateStr = `${String(rawDate.getMonth()+1).padStart(2,"0")}/${String(rawDate.getDate()).padStart(2,"0")}/${rawDate.getFullYear()}`;
    } else if (typeof rawDate === "number") {
      const d = new Date((rawDate - 25569) * 86400000);
      dateStr = `${String(d.getUTCMonth()+1).padStart(2,"0")}/${String(d.getUTCDate()).padStart(2,"0")}/${d.getUTCFullYear()}`;
    } else { dateStr = String(rawDate || "").trim(); }
    matches.push({
      id: row[colMap["#"]] || i, division: div,
      matchType: colMap.matchType !== undefined ? String(row[colMap.matchType]||"").trim() : "",
      date: dateStr, time: String(row[colMap.time]||"").trim(), team1: t1, team2: t2,
      ground: colMap.ground !== undefined ? String(row[colMap.ground]||"").trim() : "",
      umpire1: colMap.umpire1 !== undefined ? String(row[colMap.umpire1]||"").trim() : "",
      umpire2: colMap.umpire2 !== undefined ? String(row[colMap.umpire2]||"").trim() : "",
      result: colMap.result !== undefined ? String(row[colMap.result]||"").trim() : "",
      winner: colMap.winner !== undefined ? String(row[colMap.winner]||"").trim() : "",
      status: colMap.status !== undefined ? String(row[colMap.status]||"").trim() : "",
    });
  }
  return { matches, divisions: [...new Set(matches.map(m => m.division))], colMap };
}

function parseDate(s) {
  if (!s) return null;
  const p = s.split("/");
  if (p.length === 3) return new Date(parseInt(p[2]), parseInt(p[0])-1, parseInt(p[1]));
  return new Date(s);
}

function isAM(time) {
  if (!time) return null;
  const t = time.toUpperCase();
  if (t.includes("AM")) return true;
  if (t.includes("PM")) return false;
  return null;
}

function computeBalance(matches, teams) {
  const s = {};
  teams.forEach(t => { s[t] = { home:0, away:0, am:0, pm:0, umpire:0, games:0 }; });
  matches.forEach(m => {
    if (s[m.team1]) { s[m.team1].home++; s[m.team1].games++; }
    if (s[m.team2]) { s[m.team2].away++; s[m.team2].games++; }
    const a = isAM(m.time);
    if (a===true) { if(s[m.team1]) s[m.team1].am++; if(s[m.team2]) s[m.team2].am++; }
    else if (a===false) { if(s[m.team1]) s[m.team1].pm++; if(s[m.team2]) s[m.team2].pm++; }
    if (m.umpire1 && s[m.umpire1]) s[m.umpire1].umpire++;
    if (m.umpire2 && s[m.umpire2]) s[m.umpire2].umpire++;
  });
  return s;
}

function computeStandings(matches, teams) {
  const s = {};
  teams.forEach(t => { s[t] = { played:0, won:0, lost:0, abandoned:0, forfeited:0, points:0 }; });
  matches.forEach(m => {
    const res = (m.result||"").toLowerCase(), winner = (m.winner||"").trim(), status = (m.status||"").toLowerCase();
    if (!res && !winner && !status) return;
    if (res.includes("abandon") || status.includes("abandon") || res.includes("no result")) {
      if(s[m.team1]){s[m.team1].played++;s[m.team1].abandoned++;s[m.team1].points+=POINTS.abandoned;}
      if(s[m.team2]){s[m.team2].played++;s[m.team2].abandoned++;s[m.team2].points+=POINTS.abandoned;}
      return;
    }
    if (res.includes("forfeit")) {
      if (winner) {
        if(s[winner]){s[winner].played++;s[winner].won++;s[winner].points+=POINTS.forfeit_winner;}
        const loser=winner===m.team1?m.team2:m.team1;
        if(s[loser]){s[loser].played++;s[loser].forfeited++;}
      }
      return;
    }
    let w = winner;
    if (!w && res) {
      if (res.includes(m.team1.toLowerCase())) w=m.team1;
      else if (res.includes(m.team2.toLowerCase())) w=m.team2;
    }
    if (w) {
      const loser=w===m.team1?m.team2:m.team1;
      if(s[w]){s[w].played++;s[w].won++;s[w].points+=POINTS.win;}
      if(s[loser]){s[loser].played++;s[loser].lost++;}
    }
  });
  return Object.entries(s).map(([team,d])=>({team,...d})).sort((a,b)=>b.points-a.points||b.won-a.won||a.lost-b.lost);
}

/* ─── Aggregation helpers ─── */
function parseBBF(bbf) {
  if (!bbf) return [0, 999];
  const parts = String(bbf).split('/');
  return [parseInt(parts[0]) || 0, parseInt(parts[1]) || 999];
}

function addOvers(a, b) {
  const toBalls = ov => { const p = String(ov||0).split('.'); return parseInt(p[0]||0)*6 + parseInt(p[1]||0); };
  const fromBalls = b => `${Math.floor(b/6)}.${b%6}`;
  return fromBalls(toBalls(a) + toBalls(b));
}

function aggregateBatting(rows) {
  const map = new Map();
  rows.forEach(r => {
    const key = String(r.player||'').trim().toLowerCase();
    if (!map.has(key)) { map.set(key, { ...r }); return; }
    const m = map.get(key);
    m.mat = (m.mat||0) + (r.mat||0);
    m.inns = (m.inns||0) + (r.inns||0);
    m.no = (m.no||0) + (r.no||0);
    m.runs = (m.runs||0) + (r.runs||0);
    m.fours = (m.fours||0) + (r.fours||0);
    m.sixes = (m.sixes||0) + (r.sixes||0);
    m.fifties = (m.fifties||0) + (r.fifties||0);
    m.hundreds = (m.hundreds||0) + (r.hundreds||0);
    if ((parseInt(r.hs)||0) > (parseInt(m.hs)||0)) m.hs = r.hs;
    const denom = m.inns - m.no;
    m.avg = denom > 0 ? (m.runs / denom).toFixed(2) : (m.runs > 0 ? 'N/O' : '—');
    m.sr = '—';
  });
  return [...map.values()];
}

function aggregateBowling(rows) {
  const map = new Map();
  rows.forEach(r => {
    const key = String(r.player||'').trim().toLowerCase();
    if (!map.has(key)) { map.set(key, { ...r }); return; }
    const m = map.get(key);
    m.mat = (m.mat||0) + (r.mat||0);
    m.runs = (m.runs||0) + (r.runs||0);
    m.wickets = (m.wickets||0) + (r.wickets||0);
    m.maidens = (m.maidens||0) + (r.maidens||0);
    m.dots = (m.dots||0) + (r.dots||0);
    m.fiveW = (m.fiveW||0) + (r.fiveW||0);
    m.wides = (m.wides||0) + (r.wides||0);
    m.noballs = (m.noballs||0) + (r.noballs||0);
    m.overs = addOvers(m.overs, r.overs);
    const [w2, ru2] = parseBBF(r.bbf), [w1, ru1] = parseBBF(m.bbf);
    if (w2 > w1 || (w2 === w1 && ru2 < ru1)) m.bbf = r.bbf;
    const toBalls = ov => { const p = String(ov||0).split('.'); return parseInt(p[0]||0)*6+parseInt(p[1]||0); };
    const balls = toBalls(m.overs);
    m.avg = m.wickets > 0 ? (m.runs / m.wickets).toFixed(2) : '—';
    m.econ = balls > 0 ? (m.runs / (balls/6)).toFixed(2) : '—';
    m.sr = m.wickets > 0 ? (balls / m.wickets).toFixed(1) : '—';
  });
  return [...map.values()];
}

function aggregateRankings(rows) {
  const map = new Map();
  rows.forEach(r => {
    const key = String(r.player||'').trim().toLowerCase();
    if (!map.has(key)) { map.set(key, { ...r }); return; }
    const m = map.get(key);
    m.matches = (m.matches||0) + (r.matches||0);
    m.batting = (m.batting||0) + (r.batting||0);
    m.bowling = (m.bowling||0) + (r.bowling||0);
    m.fielding = (m.fielding||0) + (r.fielding||0);
    m.other = (m.other||0) + (r.other||0);
    m.mom = (m.mom||0) + (r.mom||0);
    m.total = (m.total||0) + (r.total||0);
  });
  return [...map.values()];
}

/* ─── Form guide helper ─── */
function computeFormGuide(results, team, n = 5) {
  if (!results?.matches?.length) return [];
  return results.matches
    .filter(m => m.team1 === team || m.team2 === team)
    .sort((a, b) => { const da = parseDate(a.date), db = parseDate(b.date); return da && db ? da - db : 0; })
    .slice(-n)
    .map(m => {
      const r = (m.result || '').toLowerCase();
      if (r.includes('abandon') || r.includes('no result')) return 'A';
      if (r.includes('forfeit')) {
        const teamLower = team.toLowerCase();
        return r.includes(teamLower) && !r.includes('forfeit by ' + teamLower.split(' ')[0]) ? 'W' : 'L';
      }
      const score = m.team1 === team ? m.team1Score : m.team2Score;
      if (score?.won === true) return 'W';
      if (score?.won === false) return 'L';
      return 'NR';
    });
}

function computeStreak(form) {
  if (!form.length) return null;
  const last = form[form.length - 1];
  if (last !== 'W' && last !== 'L') return null;
  let count = 0;
  for (let i = form.length - 1; i >= 0; i--) { if (form[i] === last) count++; else break; }
  return { code: last, count };
}

/* ─── Sort/filter helpers ─── */
function sortRows(rows, col, dir) {
  if (!col) return rows;
  return [...rows].sort((a, b) => {
    const va = a[col], vb = b[col];
    const na = parseFloat(va), nb = parseFloat(vb);
    const cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : String(va||'').localeCompare(String(vb||''));
    return dir === 'asc' ? cmp : -cmp;
  });
}

function SortableTh({ col, sortCol, sortDir, onSort, children, style, ...rest }) {
  return (
    <th onClick={() => onSort(col)} style={{cursor:'pointer',userSelect:'none',...(style||{})}} {...rest}>
      {children}<span style={{marginLeft:2,opacity:0.4,fontSize:8}}>{sortCol===col?(sortDir==='asc'?'▲':'▼'):'⇅'}</span>
    </th>
  );
}

/* ─── Shared visual components ─── */

function FormGuide({ results, team }) {
  const form = computeFormGuide(results, team);
  if (!form.length) return <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>;
  return (
    <div className="form-guide">
      {form.map((code, i) => <span key={i} className={`fd fd-${code}`}>{code}</span>)}
    </div>
  );
}

function StreakBadge({ results, team }) {
  const form = computeFormGuide(results, team);
  const streak = computeStreak(form);
  if (!streak) return null;
  return (
    <span className={`streak-badge streak-${streak.code}`}>
      {streak.code}{streak.count}
    </span>
  );
}

const RANK_CLASS = ['gold','silver','bronze'];
const RANK_MEDAL = ['🥇','🥈','🥉'];

function LeaderCard({ rank, label, stat, name, sub, pct }) {
  const cls = RANK_CLASS[rank] || '';
  return (
    <div className={`leader-card ${cls}`}>
      <div className="leader-label"><span className="leader-medal">{RANK_MEDAL[rank] || ''}</span>{label}</div>
      <div className="leader-stat">{stat}</div>
      <div className="leader-name">{name}</div>
      {sub && <div className="leader-sub">{sub}</div>}
      <div style={{flex:1}}></div>
      <div className="leader-bar"><div className="leader-bar-fill" style={{width:`${pct}%`}}></div></div>
    </div>
  );
}

function LeaderSection({ rows, statKey, label, nameKey = 'player', teamKey = 'team', fmt, ascending }) {
  if (!rows?.length) return null;
  const sorted = [...rows]
    .filter(r => r[statKey] !== undefined && r[statKey] !== '—' && r[statKey] !== null)
    .sort((a, b) => ascending
      ? (parseFloat(a[statKey]) || 9999) - (parseFloat(b[statKey]) || 9999)
      : (parseFloat(b[statKey]) || 0) - (parseFloat(a[statKey]) || 0)
    );
  const top = sorted.slice(0, 3);
  if (!top.length) return null;
  const ref = parseFloat(top[0][statKey]) || 1;
  return (
    <div className="leader-row">
      {top.map((r, i) => (
        <LeaderCard key={r[nameKey] + i} rank={i} label={label}
          stat={fmt ? fmt(r[statKey]) : r[statKey]}
          name={r[nameKey]} sub={r[teamKey]}
          pct={ascending
            ? (ref / (parseFloat(r[statKey]) || 1)) * 100
            : ((parseFloat(r[statKey]) || 0) / ref) * 100
          }
        />
      ))}
    </div>
  );
}

function NextMatchCard({ matches, division }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dm = division ? matches.filter(m => m.division === division) : matches;
  const cmp = (a, b) => { const da = parseDate(a.date), db = parseDate(b.date); if (da && db && da-db !== 0) return da-db; return (a.time||'').localeCompare(b.time||''); };
  const upcoming = dm.filter(m => { const d = parseDate(m.date); return !d || d >= today; }).sort(cmp);
  const next = upcoming[0];
  if (!next) return null;
  const d = parseDate(next.date);
  return (
    <div className="next-match-card">
      <div className="nmc-date-box">
        <div className="nmc-date-day">{d ? d.getDate() : '?'}</div>
        <div className="nmc-date-month">{d ? d.toLocaleDateString('en-US',{month:'short'}) : ''}</div>
      </div>
      <div className="nmc-body">
        <div className="nmc-label">Next Match{d ? ` · ${d.toLocaleDateString('en-US',{weekday:'long'})}` : ''}</div>
        <div className="nmc-teams">{next.team1} <span style={{opacity:0.55,fontWeight:400,fontSize:14}}>vs</span> {next.team2}</div>
        <div className="nmc-meta">
          {next.time && <span>⏰ {next.time}</span>}
          {next.ground && <span>📍 {next.ground}</span>}
        </div>
      </div>
      <div className="nmc-count">
        <div className="nmc-count-val">{upcoming.length}</div>
        <div className="nmc-count-lbl">Upcoming</div>
      </div>
    </div>
  );
}

function ResultStrip({ results, division }) {
  const matches = (results?.matches || []).filter(m => !division || m.division === division);
  if (!matches.length) return null;
  let played = matches.length, wins = 0, losses = 0, abd = 0;
  matches.forEach(m => {
    const r = (m.result||'').toLowerCase();
    if (r.includes('abandon') || r.includes('no result')) abd++;
    else if (m.team1Score?.won || m.team2Score?.won) { wins++; /* count matches with a winner */ }
  });
  const latest = [...matches].sort((a,b) => { const da=parseDate(a.date),db=parseDate(b.date); return da&&db?db-da:0; })[0];
  return (
    <div className="result-strip">
      <div className="rs-card"><div className="rs-val rs-played">{played}</div><div className="rs-lbl">Played</div></div>
      <div className="rs-card"><div className="rs-val rs-wins">{wins}</div><div className="rs-lbl">Completed</div></div>
      <div className="rs-card"><div className="rs-val rs-abd">{abd}</div><div className="rs-lbl">Abandoned</div></div>
      {latest && <div className="rs-card" style={{flex:3,textAlign:'left'}}>
        <div style={{fontSize:9.5,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:4}}>Latest Result</div>
        <div style={{fontWeight:700,fontSize:13}}>{latest.team1} v {latest.team2}</div>
        <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:2}}>{latest.result||'—'}</div>
        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{latest.date}{latest.division ? ` · ${latest.division}` : ''}</div>
      </div>}
    </div>
  );
}

/* ─── Drilldown: Player panel ─── */
function PlayerPanel({ name, batting, bowling, rankings, results, matches, onClose, onDrilldown }) {
  const batRows = batting
    ? Object.entries(batting).filter(([k]) => k !== 'updatedAt' && k !== 'combined')
        .flatMap(([div, rows]) => Array.isArray(rows) ? rows.filter(r => String(r.player||'').toLowerCase() === name.toLowerCase()).map(r => ({...r, _div:div})) : [])
    : [];
  const bowlRows = bowling
    ? Object.entries(bowling).filter(([k]) => k !== 'updatedAt' && k !== 'combined')
        .flatMap(([div, rows]) => Array.isArray(rows) ? rows.filter(r => String(r.player||'').toLowerCase() === name.toLowerCase()).map(r => ({...r, _div:div})) : [])
    : [];
  const rankRows = rankings
    ? Object.entries(rankings).filter(([k]) => k !== 'updatedAt' && k !== 'combined')
        .flatMap(([div, rows]) => Array.isArray(rows) ? rows.filter(r => String(r.player||'').toLowerCase() === name.toLowerCase()).map(r => ({...r, _div:div})) : [])
    : [];

  const teams = [...new Set([...batRows, ...bowlRows].map(r => r.team).filter(Boolean))];
  const divs  = [...new Set([...batRows, ...bowlRows].map(r => r._div).filter(Boolean))];

  const bat  = aggregateBatting(batRows)[0]  || null;
  const bowl = aggregateBowling(bowlRows)[0] || null;
  const rankTotals = rankRows.reduce((acc, r) => ({
    total: acc.total + (Number(r.total)||0), batting: acc.batting + (Number(r.batting)||0),
    bowling: acc.bowling + (Number(r.bowling)||0), mom: acc.mom + (Number(r.mom)||0),
  }), { total:0, batting:0, bowling:0, mom:0 });

  const teamResults = (results?.matches||[])
    .filter(m => teams.some(t => m.team1===t || m.team2===t))
    .sort((a,b) => { const da=parseDate(a.date),db=parseDate(b.date); return da&&db?db-da:0; })
    .slice(0, 8);

  if (!bat && !bowl && !rankRows.length) return (
    <div className="panel-content">
      <div className="panel-header">
        <div><div className="panel-title">{name}</div></div>
        <button className="panel-close" onClick={onClose}>✕</button>
      </div>
      <div className="empty-state">No stats found for this player.</div>
    </div>
  );

  return (
    <div className="panel-content">
      <div className="panel-header">
        <div>
          <div className="panel-title">{name}</div>
          <div className="panel-sub">
            {teams.map((t,i) => <span key={t}>{i>0?', ':''}<span className="clickable" onClick={() => onDrilldown({type:'team',name:t})}>{t}</span></span>)}
            {divs.length ? <span> · {divs.join(', ')}</span> : null}
          </div>
        </div>
        <button className="panel-close" onClick={onClose}>✕</button>
      </div>

      {bat && <>
        <div className="section-label">Batting — Season</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(68px,1fr))',gap:8,marginBottom:batRows.length>1?12:20}}>
          {[['Runs',bat.runs],['Avg',bat.avg],['SR',bat.sr],['50s',bat.fifties],['100s',bat.hundreds],['HS',bat.hs],['6s',bat.sixes]].map(([l,v]) => (
            <div key={l} className="stat-tile"><div className="stat-tile-val">{v??'—'}</div><div className="stat-tile-lbl">{l}</div></div>
          ))}
        </div>
        {batRows.length > 1 && (
          <div className="scroll-x" style={{marginBottom:20}}>
            <table><thead><tr><th>Division</th><th>Mat</th><th>Inns</th><th>Runs</th><th>Avg</th><th>SR</th><th>50s</th><th>HS</th></tr></thead>
              <tbody>{batRows.map((r,i) => <tr key={i}><td style={{fontSize:12}}>{r._div}</td><td className="num-cell">{r.mat}</td><td className="num-cell">{r.inns}</td><td className="num-cell">{r.runs}</td><td className="num-cell">{r.avg}</td><td className="num-cell">{r.sr}</td><td className="num-cell">{r.fifties}</td><td className="num-cell">{r.hs}</td></tr>)}</tbody>
            </table>
          </div>
        )}
      </>}

      {bowl && <>
        <div className="section-label">Bowling — Season</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(68px,1fr))',gap:8,marginBottom:bowlRows.length>1?12:20}}>
          {[['Wkts',bowl.wickets],['Econ',bowl.econ],['Avg',bowl.avg],['BBF',bowl.bbf],['5W',bowl.fiveW],['Mdns',bowl.maidens]].map(([l,v]) => (
            <div key={l} className="stat-tile"><div className="stat-tile-val">{v??'—'}</div><div className="stat-tile-lbl">{l}</div></div>
          ))}
        </div>
        {bowlRows.length > 1 && (
          <div className="scroll-x" style={{marginBottom:20}}>
            <table><thead><tr><th>Division</th><th>Mat</th><th>Ovs</th><th>Wkts</th><th>Runs</th><th>Econ</th><th>BBF</th></tr></thead>
              <tbody>{bowlRows.map((r,i) => <tr key={i}><td style={{fontSize:12}}>{r._div}</td><td className="num-cell">{r.mat}</td><td className="num-cell">{r.overs}</td><td className="num-cell">{r.wickets}</td><td className="num-cell">{r.runs}</td><td className="num-cell">{r.econ}</td><td className="num-cell">{r.bbf}</td></tr>)}</tbody>
            </table>
          </div>
        )}
      </>}

      {rankTotals.total > 0 && <>
        <div className="section-label">Rankings Points</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(68px,1fr))',gap:8,marginBottom:20}}>
          {[['Total',rankTotals.total],['Batting',rankTotals.batting],['Bowling',rankTotals.bowling],['MoM',rankTotals.mom]].map(([l,v]) => (
            <div key={l} className="stat-tile"><div className="stat-tile-val">{v}</div><div className="stat-tile-lbl">{l}</div></div>
          ))}
        </div>
      </>}

      {teamResults.length > 0 && <>
        <div className="section-label">Team's Recent Matches</div>
        <div>
          {teamResults.map((m, i) => {
            const myScore = teams.includes(m.team1) ? m.team1Score : m.team2Score;
            const r = (m.result||'').toLowerCase();
            const code = r.includes('abandon')||r.includes('no result') ? 'A' : myScore?.won===true ? 'W' : myScore?.won===false ? 'L' : 'NR';
            return (
              <div key={i} className="result-row">
                <span className={`fd fd-${code}`} style={{flexShrink:0}}>{code}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.team1} <span style={{opacity:0.45,fontWeight:400}}>v</span> {m.team2}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{m.date} · {m.result||'—'}</div>
                </div>
              </div>
            );
          })}
        </div>
      </>}
    </div>
  );
}

/* ─── Drilldown: Team panel ─── */
function TeamPanel({ name, matches, results, batting, bowling, onClose, onDrilldown }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const teamMatches = matches.filter(m => m.team1===name || m.team2===name);
  const upcoming = teamMatches
    .filter(m => { const d=parseDate(m.date); return !d||d>=today; })
    .sort((a,b) => { const da=parseDate(a.date),db=parseDate(b.date); return da&&db?da-db:0; });
  const teamResults = (results?.matches||[])
    .filter(m => m.team1===name || m.team2===name)
    .sort((a,b) => { const da=parseDate(a.date),db=parseDate(b.date); return da&&db?db-da:0; });

  const divs = [...new Set(teamMatches.map(m => m.division))];
  const form = computeFormGuide(results, name, 10);
  const streak = computeStreak(form);
  const wins = form.filter(f=>f==='W').length;
  const losses = form.filter(f=>f==='L').length;
  const abds = form.filter(f=>f==='A').length;

  const teamBatRows = batting
    ? Object.entries(batting).filter(([k]) => k!=='updatedAt'&&k!=='combined')
        .flatMap(([,rows]) => Array.isArray(rows) ? rows.filter(r => r.team===name) : [])
    : [];
  const topBatters = aggregateBatting(teamBatRows).sort((a,b) => (Number(b.runs)||0)-(Number(a.runs)||0)).slice(0,5);

  const teamBowlRows = bowling
    ? Object.entries(bowling).filter(([k]) => k!=='updatedAt'&&k!=='combined')
        .flatMap(([,rows]) => Array.isArray(rows) ? rows.filter(r => r.team===name) : [])
    : [];
  const topBowlers = aggregateBowling(teamBowlRows).sort((a,b) => (Number(b.wickets)||0)-(Number(a.wickets)||0)).slice(0,5);

  return (
    <div className="panel-content">
      <div className="panel-header">
        <div>
          <div className="panel-title">{name}</div>
          <div className="panel-sub">{divs.join(', ')}</div>
        </div>
        <button className="panel-close" onClick={onClose}>✕</button>
      </div>

      {form.length > 0 && <>
        <div className="section-label">Season Record</div>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
          <div className="form-guide">{form.map((c,i) => <span key={i} className={`fd fd-${c}`}>{c}</span>)}</div>
          {streak && <span className={`streak-badge streak-${streak.code}`}>{streak.code}{streak.count}</span>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
          <div className="stat-tile"><div className="stat-tile-val" style={{color:'#17bf63'}}>{wins}</div><div className="stat-tile-lbl">Won</div></div>
          <div className="stat-tile"><div className="stat-tile-val" style={{color:'#e0245e'}}>{losses}</div><div className="stat-tile-lbl">Lost</div></div>
          <div className="stat-tile"><div className="stat-tile-val" style={{color:'#f0a500'}}>{abds}</div><div className="stat-tile-lbl">Abd</div></div>
        </div>
      </>}

      {topBatters.length > 0 && <>
        <div className="section-label">Top Batters</div>
        <div style={{marginBottom:20}}>
          {topBatters.map((r,i) => (
            <div key={i} className="result-row" style={{cursor:'pointer'}} onClick={() => onDrilldown({type:'player',name:r.player})}>
              <span style={{fontSize:12,fontWeight:800,color:'var(--text-muted)',width:18,textAlign:'center',flexShrink:0}}>{i+1}</span>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:'var(--accent)'}}>{r.player}</div></div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:15,fontFamily:"'JetBrains Mono',monospace"}}>{r.runs}</div>
                <div style={{fontSize:10,color:'var(--text-muted)'}}>runs</div>
              </div>
            </div>
          ))}
        </div>
      </>}

      {topBowlers.length > 0 && <>
        <div className="section-label">Top Bowlers</div>
        <div style={{marginBottom:20}}>
          {topBowlers.map((r,i) => (
            <div key={i} className="result-row" style={{cursor:'pointer'}} onClick={() => onDrilldown({type:'player',name:r.player})}>
              <span style={{fontSize:12,fontWeight:800,color:'var(--text-muted)',width:18,textAlign:'center',flexShrink:0}}>{i+1}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13,color:'var(--accent)'}}>{r.player}</div>
                {r.econ !== '—' && <div style={{fontSize:11,color:'var(--text-muted)'}}>Econ {r.econ}</div>}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:15,fontFamily:"'JetBrains Mono',monospace"}}>{r.wickets}</div>
                <div style={{fontSize:10,color:'var(--text-muted)'}}>wkts</div>
              </div>
            </div>
          ))}
        </div>
      </>}

      {upcoming.length > 0 && <>
        <div className="section-label">Upcoming Fixtures</div>
        <div style={{marginBottom:20}}>
          {upcoming.slice(0,5).map((m,i) => {
            const opp = m.team1===name ? m.team2 : m.team1;
            const home = m.team1===name;
            const d = parseDate(m.date);
            return (
              <div key={i} className="fixture-row">
                <div style={{textAlign:'center',flexShrink:0,minWidth:36}}>
                  <div style={{fontSize:16,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}>{d?d.getDate():'?'}</div>
                  <div style={{fontSize:9,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase'}}>{d?d.toLocaleDateString('en-US',{month:'short'}):''}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13}}>
                    <span style={{color:'var(--text-muted)',fontSize:10,marginRight:4}}>{home?'vs':'@'}</span>
                    <span className="clickable" onClick={() => onDrilldown({type:'team',name:opp})}>{opp}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{m.time||'TBD'}{m.ground?` · ${m.ground}`:''}</div>
                </div>
              </div>
            );
          })}
        </div>
      </>}

      {teamResults.length > 0 && <>
        <div className="section-label">Recent Results</div>
        <div>
          {teamResults.slice(0,8).map((m,i) => {
            const myScore = m.team1===name ? m.team1Score : m.team2Score;
            const r = (m.result||'').toLowerCase();
            const code = r.includes('abandon')||r.includes('no result') ? 'A' : myScore?.won===true ? 'W' : myScore?.won===false ? 'L' : 'NR';
            const opp = m.team1===name ? m.team2 : m.team1;
            return (
              <div key={i} className="result-row">
                <span className={`fd fd-${code}`} style={{flexShrink:0}}>{code}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13}}>vs <span className="clickable" onClick={e=>{e.stopPropagation();onDrilldown({type:'team',name:opp});}}>{opp}</span></div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{m.date} · {m.result||'—'}</div>
                </div>
              </div>
            );
          })}
        </div>
      </>}
    </div>
  );
}

function DrilldownPanel({ drilldown, data, onClose, onDrilldown }) {
  useEffect(() => {
    if (!drilldown) return;
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [drilldown]);
  if (!drilldown) return null;
  const pd = { batting:data.batting, bowling:data.bowling, rankings:data.rankings, results:data.results, matches:data.matches };
  return (
    <>
      <div className="panel-overlay" onClick={onClose}/>
      <div className="panel-drawer">
        {drilldown.type === 'player'
          ? <PlayerPanel name={drilldown.name} {...pd} onClose={onClose} onDrilldown={onDrilldown}/>
          : <TeamPanel   name={drilldown.name} {...pd} onClose={onClose} onDrilldown={onDrilldown}/>}
      </div>
    </>
  );
}

/* ─── Views ─── */
function ScheduleView({ matches, division, onDrilldown }) {
  const [teamFilter, setTeamFilter] = useState("");
  const [subTab, setSubTab] = useState("upcoming");
  const dm = matches.filter(m => m.division === division);
  const teams = [...new Set(dm.flatMap(m => [m.team1, m.team2]))].sort();
  const today = new Date(); today.setHours(0,0,0,0);

  const isUpcoming = m => { const d = parseDate(m.date); return !d || d >= today; };
  const matchesTeam = m => !teamFilter || m.team1 === teamFilter || m.team2 === teamFilter;
  const cmpAsc = (a,b) => {
    const da = parseDate(a.date), db = parseDate(b.date);
    if (da && db && da-db !== 0) return da-db;
    return (a.time||"").localeCompare(b.time||"");
  };

  const upcoming = dm.filter(m => matchesTeam(m) && isUpcoming(m)).sort(cmpAsc);
  const past     = dm.filter(m => matchesTeam(m) && !isUpcoming(m) && parseDate(m.date)).sort((a,b) => -cmpAsc(a,b));

  const groupByDate = ms => {
    const g = {};
    ms.forEach(m => { const k = m.date||"TBD"; if(!g[k]) g[k]=[]; g[k].push(m); });
    return Object.entries(g);
  };

  const matchRow = m => (
    <tr key={m.id}>
      <td className="num-cell" style={{color:"var(--text-muted)",width:40}}>{m.id}</td>
      <td style={{width:90}}>
        <span className={`badge ${isAM(m.time)===true?"badge-am":isAM(m.time)===false?"badge-pm":""}`}>{m.time||"TBD"}</span>
      </td>
      <td className="team-name clickable" onClick={() => onDrilldown({type:'team',name:m.team1})}>{m.team1}</td>
      <td className="team-name clickable" onClick={() => onDrilldown({type:'team',name:m.team2})}>{m.team2}</td>
      <td style={{color:"var(--text-muted)",fontSize:12}}>{m.ground||"—"}</td>
      <td style={{color:"var(--text-muted)",fontSize:12}}>{m.umpire1||"—"}</td>
      <td style={{fontSize:12,color:m.result||m.winner?"var(--text-primary)":"var(--text-muted)"}}>{m.result||m.winner||"—"}</td>
    </tr>
  );

  const dateRows = (ms, isPast) => groupByDate(ms).flatMap(([date, grp]) => {
    const d = parseDate(date);
    return [
      <tr key={`h-${date}-${isPast}`}>
        <td colSpan={7} className="date-group">
          {date}{d && ` · ${d.toLocaleDateString("en-US",{weekday:"long"})}`}
          {isPast && <span style={{marginLeft:8,opacity:0.6}}>played</span>}
        </td>
      </tr>,
      ...grp.map(matchRow)
    ];
  });

  const visibleRows = subTab === "upcoming" ? upcoming : past;

  function shareOnWhatsApp() {
    const list = subTab === "upcoming" ? upcoming : past;
    if (!list.length) return;
    const label = subTab === "upcoming" ? "Upcoming Fixtures" : "Past Fixtures";
    let text = `🏏 SYCL — ${division}\n${label}\n\n`;
    const grouped = groupByDate(list);
    grouped.forEach(([date, grp]) => {
      const d = parseDate(date);
      const dayLabel = d
        ? d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" })
        : date || "TBD";
      text += `📅 ${dayLabel}\n`;
      grp.forEach(m => {
        const time = m.time ? `⏰ ${m.time}  ` : "";
        const ground = m.ground ? `  📍 ${m.ground}` : "";
        text += `  ${time}${m.team1} vs ${m.team2}${ground}\n`;
      });
      text += "\n";
    });
    text = text.trimEnd() + "\n\n🔗 " + window.location.origin;
    window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
  }

  return (
    <div>
      <NextMatchCard matches={matches} division={division}/>
      <div className="sub-tab-bar" style={{display:"flex",alignItems:"center",gap:6}}>
        <button className={`sub-tab-btn ${subTab==="upcoming"?"active":""}`} onClick={()=>setSubTab("upcoming")}>
          Upcoming <span className="sub-count">{upcoming.length}</span>
        </button>
        <button className={`sub-tab-btn ${subTab==="past"?"active":""}`} onClick={()=>setSubTab("past")}>
          Past <span className="sub-count">{past.length}</span>
        </button>
        <div style={{flex:1}}/>
        {visibleRows.length > 0 && (
          <button onClick={shareOnWhatsApp} style={{
            display:"inline-flex",alignItems:"center",gap:5,padding:"5px 12px",
            background:"#25D366",color:"#fff",border:"none",borderRadius:7,
            fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,
            boxShadow:"0 1px 4px rgba(37,211,102,0.35)",transition:"background 0.12s"
          }}
            onMouseEnter={e=>e.currentTarget.style.background="#1ebe5d"}
            onMouseLeave={e=>e.currentTarget.style.background="#25D366"}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Share
          </button>
        )}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px"}}>Team</span>
        <select className="team-select" value={teamFilter} onChange={e=>setTeamFilter(e.target.value)}>
          <option value="">All teams</option>
          {teams.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {teamFilter && <button className="small-btn" onClick={()=>setTeamFilter("")}>✕</button>}
      </div>
      <div className="scroll-x">
        <table>
          <thead><tr>
            <th>#</th><th>Time</th><th>Home (Team 1)</th><th>Away (Team 2)</th>
            <th>Ground</th><th>Umpire</th><th>Result</th>
          </tr></thead>
          <tbody>
            {visibleRows.length===0 && (
              <tr><td colSpan={7} className="empty-state">No matches found.</td></tr>
            )}
            {dateRows(visibleRows, subTab === "past")}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function StandingsView({ matches, division, standings, results, onDrilldown }) {
  const [sortCol, setSortCol] = useState('pts');
  const [sortDir, setSortDir] = useState('desc');
  const [filter, setFilter] = useState('');

  const ccRows = standings?.[division]?.rows;
  const ts = standings?.[division]?.updatedAt;
  function toggleSort(col) { sortCol === col ? setSortDir(d => d==='asc'?'desc':'asc') : (setSortCol(col), setSortDir('asc')); }
  const Th = (p) => <SortableTh sortCol={sortCol} sortDir={sortDir} onSort={toggleSort} {...p}/>;

  const hasResults = results?.matches?.some(m => m.division === division);

  if (ccRows?.length > 0) {
    const q = filter.toLowerCase();
    const raw = filter ? ccRows.filter(s => s.team?.toLowerCase().includes(q)) : ccRows;
    const rows = sortRows(raw, sortCol, sortDir);
    const leader = rows[0];
    return (
      <div>
        {/* Leader summary card */}
        {leader && (
          <div className="leader-row" style={{gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))'}}>
            <div className="leader-card gold">
              <div className="leader-label"><span className="leader-medal">🏆</span>Division Leader</div>
              <div className="leader-stat">{leader.pts} pts</div>
              <div className="leader-name clickable" onClick={() => onDrilldown({type:'team',name:leader.team})}>{leader.team}</div>
              <div className="leader-sub">{leader.won}W · {leader.lost}L{leader.nr>0?` · ${leader.nr}NR`:''} · Win% {leader.winPct}</div>
              {hasResults && <div style={{marginTop:10}}><FormGuide results={results} team={leader.team}/></div>}
              <div className="leader-bar"><div className="leader-bar-fill" style={{width:'100%'}}></div></div>

                <td style={{fontSize:11,color:"var(--text-secondary)"}}>{r.division}</td>
                <td className="team-name clickable" onClick={() => onDrilldown({type:'team',name:r.team1})}>
                  {r.team1}{r.team1Score?.won && <span style={{marginLeft:4,fontSize:8,color:"var(--clr-ok)"}}>●</span>}
                </td>
                <td className="team-name clickable" onClick={() => onDrilldown({type:'team',name:r.team2})}>
                  {r.team2}{r.team2Score?.won && <span style={{marginLeft:4,fontSize:8,color:"var(--clr-ok)"}}>●</span>}
                </td>
                <td style={{fontSize:12,whiteSpace:"nowrap",color:"var(--text-secondary)"}}>
                  {r.team1Score ? <span>{r.team1Score.score}{r.team1Score.overs && <span style={{fontSize:10,color:"var(--text-muted)"}}> ({r.team1Score.overs})</span>}</span> : null}
                  {r.team1Score && r.team2Score ? <span style={{color:"var(--text-muted)",margin:"0 4px"}}>·</span> : null}
                  {r.team2Score ? <span>{r.team2Score.score}{r.team2Score.overs && <span style={{fontSize:10,color:"var(--text-muted)"}}> ({r.team2Score.overs})</span>}</span> : null}
                  {!r.team1Score && !r.team2Score ? "—" : null}
                </td>
                <td style={{fontSize:12}}>{r.result}</td>
                <td>{r.scorecard ? <a href={r.scorecard} target="_blank" rel="noopener" style={{fontSize:11,color:"var(--a-500)",whiteSpace:"nowrap"}}>Scorecard ↗</a> : null}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ─── Main dashboard ─── */
function SYCLDashboard() {
  const [data, setData] = useState(null);
  const [selectedDivision, setSelectedDivision] = useState(null);
  const [activeTab, setActiveTab] = useState("schedule");
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('sycl_theme') || 'light'; } catch { return 'light'; }
  });
  const [loading, setLoading] = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [drilldown, setDrilldown] = useState(null);
  const handleDrilldown = useCallback((d) => setDrilldown(d), []);
  const closeDrilldown = useCallback(() => setDrilldown(null), []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('sycl_theme', theme); } catch {}
  }, [theme]);

  const loadData = useCallback((bustCache) => {
    setLoading(true);
    const url = bustCache ? `/api/schedule?_t=${Date.now()}` : "/api/schedule";
    fetch(url)
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (d?.matches?.length) {
          const divisions = [...new Set(d.matches.map(m => m.division))];
          setData(prev => {
            const next = { matches: d.matches, divisions, standings: d.standings || {}, batting: d.batting || null, bowling: d.bowling || null, rankings: d.rankings || null, results: d.results || null };
            if (!prev) setSelectedDivision(divisions[0]);
            return next;
          });
          setLastRefresh(d.updatedAt);
        }
      })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => { loadData(false); }, []);

  const divOrder = ["Emerging Stars","U11A","U11B","U13A","U13B","U15A","U15B"];
  const sortedDivs = useMemo(() => {
    if (!data) return [];
    return [...data.divisions].sort((a, b) => {
      const ai = divOrder.indexOf(a), bi = divOrder.indexOf(b);
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });
  }, [data]);

  const tabs = [["schedule","Schedule"],["standings","Standings"],["results","Results"],["batting","Batting"],["bowling","Bowling"],["rankings","Rankings"]];

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">
        {/* ── Header ── */}
        <div className="header">
          <div className="header-left">
            <span className="header-cricket">🏏</span>
            <div className="header-sep"></div>
            <div>
              <div style={{fontSize:17,fontWeight:800,letterSpacing:"-0.5px",color:"var(--header-text)"}}>SYCL Schedule</div>
              {lastRefresh && (
                <div className="header-sub">
                  Updated {new Date(lastRefresh).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} at {new Date(lastRefresh).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
                </div>
              )}
            </div>
          </div>
          <div className="header-actions">
            <button className="small-btn" onClick={() => loadData(true)} title="Refresh data" disabled={loading}>
              {loading ? "…" : "↻"}
            </button>
            <a href="/admin.html" className="small-btn">Admin</a>
            <button className="theme-toggle" onClick={() => setTheme(t => t==="light"?"dark":"light")} title="Toggle theme">
              {theme==="light" ? "☾" : "☀"}
            </button>
          </div>
        </div>

        {/* ── Content ── */}
        {!data ? (
          <div className="content-wrap" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:320}}>
            {loading
              ? <div className="loading-text" style={{fontSize:13,color:"var(--text-muted)"}}>Loading…</div>
              : <div style={{textAlign:"center"}}>
                  <div style={{fontSize:40,marginBottom:14}}>🏏</div>
                  <div style={{fontSize:16,fontWeight:700,color:"var(--text-secondary)",marginBottom:6}}>No schedule data yet</div>
                  <button className="small-btn" style={{marginTop:16}} onClick={() => loadData(true)}>Try again</button>
                </div>
            }
          </div>
        ) : (
          <div className="content-wrap">
            {/* Division bar */}
            <div className="division-bar">
              {["batting","bowling","rankings"].includes(activeTab) && (
                <button className={`div-btn ${selectedDivision==="combined"?"active":""}`}
                  onClick={()=>setSelectedDivision("combined")}>
                  All
                </button>
              )}
              {sortedDivs.map(d => (
                <button key={d} className={`div-btn ${selectedDivision===d?"active":""}`}
                  onClick={()=>{
                    setSelectedDivision(d);
                    if(!["standings","batting","bowling","rankings"].includes(activeTab)) setActiveTab("schedule");
                  }}>
                  {d}
                </button>
              ))}
            </div>

            <>
              {/* Tab bar */}
              <div className="tab-bar">
                {tabs.map(([k,l]) => (
                  <button key={k} className={`tab-btn ${activeTab===k?"active":""}`} onClick={()=>{
                    setActiveTab(k);
                    if (selectedDivision === "combined" && !["batting","bowling","rankings"].includes(k)) {
                      setSelectedDivision(sortedDivs[0] || null);
                    }
                  }}>{l}</button>
                ))}
              </div>

              {selectedDivision && activeTab==="schedule"  && <ScheduleView  matches={data.matches} division={selectedDivision} onDrilldown={handleDrilldown}/>}
              {selectedDivision && activeTab==="standings" && <StandingsView matches={data.matches} division={selectedDivision} standings={data.standings} results={data.results} onDrilldown={handleDrilldown}/>}
              {activeTab==="results"  && <ResultsView  results={data.results} onDrilldown={handleDrilldown}/>}
              {activeTab==="batting"  && <BattingView  batting={data.batting}  division={selectedDivision} onDrilldown={handleDrilldown}/>}
              {activeTab==="bowling"  && <BowlingView  bowling={data.bowling}  division={selectedDivision} onDrilldown={handleDrilldown}/>}
              {activeTab==="rankings" && <RankingsView rankings={data.rankings} division={selectedDivision} onDrilldown={handleDrilldown}/>}
            </>
          </div>
        )}
      </div>
      {data && <DrilldownPanel drilldown={drilldown} data={data} onClose={closeDrilldown} onDrilldown={handleDrilldown}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SYCLDashboard));
  </script>
</body>
</html>
